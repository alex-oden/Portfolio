---
deployment:
  tasks:
    - export DEPLOYPATH=/home/alexoden/staging.alexoden.com/
    - /usr/bin/rsync -a --delete --exclude='.git' --exclude='.well-known' --exclude='cgi-bin' ./ "$DEPLOYPATH"
    # rsync -a copies the repo dir's 700 perms onto the docroot, which makes
    # LiteSpeed return 403. Reset the docroot to 755 so the web server can read it.
    - /bin/chmod 755 "$DEPLOYPATH"
